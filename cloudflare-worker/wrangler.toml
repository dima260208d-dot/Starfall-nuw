name = "starfall-assets-cdn"
main = "src/worker.js"
compatibility_date = "2024-01-01"

# Cron keep-alive: Supabase + VPS health (не трогает игровую логику)
[triggers]
crons = ["0 */4 * * *"]

# Bucket создаётся командой: npm run cf:bucket
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "starfall-assets"
